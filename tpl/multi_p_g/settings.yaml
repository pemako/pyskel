---
service:
  host: '[::]'
  port: 50051
  workers: 4
  # Number of threads inside each worker that serve concurrent RPCs.
  # gRPC with sync servicers handles parallel calls via a thread pool.
  threads_per_worker: 10
  # Seconds the parent gives each worker to drain in-flight RPCs on
  # shutdown before terminate().
  shutdown_grace: 10

logs:
  version: 1
  disable_existing_loggers: false
  formatters:
    base:
      format: "%(asctime)s %(levelname)s %(name)s [pid=%(process)d %(processName)s] - %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: base
      stream: ext://sys.stdout
    timefile:
      class: logging.handlers.TimedRotatingFileHandler
      level: DEBUG
      formatter: base
      filename: logs/multi_p_g.log
      when: D
      interval: 1
      backupCount: 7
      encoding: utf-8
  loggers:
    multi_p_g:
      level: INFO
      handlers: [timefile, console]
      propagate: false
  root:
    level: WARNING
    handlers: [console]
