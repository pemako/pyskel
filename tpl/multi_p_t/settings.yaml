---
service:
  host: 127.0.0.1
  port: 9090
  workers: 4
  # Number of threads inside each worker for handling concurrent connections.
  # TThreadedServer spawns one thread per connection up to this many.
  threads_per_worker: 32
  # Seconds the parent gives each worker to drain in-flight RPCs.
  shutdown_grace: 10

logs:
  version: 1
  disable_existing_loggers: false
  formatters:
    base:
      format: "%(asctime)s %(levelname)s %(name)s [pid=%(process)d %(processName)s] - %(message)s"
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: base
      stream: ext://sys.stdout
    timefile:
      class: logging.handlers.TimedRotatingFileHandler
      level: DEBUG
      formatter: base
      filename: logs/multi_p_t.log
      when: D
      interval: 1
      backupCount: 7
      encoding: utf-8
  loggers:
    multi_p_t:
      level: INFO
      handlers: [timefile, console]
      propagate: false
  root:
    level: WARNING
    handlers: [console]
